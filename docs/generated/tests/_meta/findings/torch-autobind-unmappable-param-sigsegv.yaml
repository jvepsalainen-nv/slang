  source_slang: docs/generated/tests/_meta/findings/torch-autobind-unmappable-param-sigsegv.repro.slang
  observed_summary: |
    An [AutoPyBindCUDA][CudaKernel] function whose parameter type cannot be mapped to a
    host type (here `String`) first correctly emits error E56001 "CUDA type mapping failed",
    but the compiler then crashes with SIGSEGV (exit 139) instead of stopping cleanly after
    the diagnostic.
  exit_code: 139
  stderr_tail: "error[E56001]: CUDA type mapping failed\\n  | Could not automatically map 'string' to a host type. Automatic binding generation failed for 'myKernel'"
expected:
  claim: |
    When an [AutoPyBindCUDA] kernel parameter type cannot be auto-mapped to a host type, the
    compiler should emit the E56001 diagnostic and abort the binding generation cleanly with a
    non-zero error exit, as it does for mappable struct/array/builtin parameter types in the
    sibling test (which compile without crashing). A diagnosed error must never be followed by
    a SIGSEGV.
