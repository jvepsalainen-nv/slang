title: "do...catch/throws/try shader segfaults executing on CPU compute backend"
observed_at: "2026-06-06T13:35:16+00:00"
scope: cpp
evidence:
  command: "build/RelWithDebInfo/bin/slang-test <tmp>/dc.slang  (//TEST:COMPARE_COMPUTE(filecheck-buffer=CHECK):-cpu -output-using-type)"
  source_slang: docs/generated/tests/design/syntax-reference/grammar/stmt-do-catch-emit.slang
  observed_summary: |
    A compute kernel using the documented DoCatchStmt control flow
    (`do { v = try risky(...); } catch (MyError e) { ... }` with a `throws MyError`
    callee) compiles cleanly to C++ (`slangc -target cpp` exit 0) but SIGSEGVs the
    slang-test CPU execution backend (the test-server reports repeated
    "JSON RPC failure: waitForResult()" then the process dies with signal 139).
    The grammar test was switched to observe the production via `-target cpp`
    emission (which is stable) instead of CPU execution, to avoid shipping a
    crashing test.
  exit_code: 139
  stderr_tail: "JSON RPC failure: waitForResult() / JSON RPC failure: hasMessage() -> Segmentation fault (139)"
expected:
  claim: |
    A `do ... catch` statement whose body invokes a `throws`-declared function via
    `try`, on the success path (no error thrown), should run to completion and write
    the non-error result to the output buffer. The construct already compiles to C++
    without error, so executing the emitted kernel on the CPU backend should not crash.
  citation_kind: sibling-test
  citation: tests/language-feature/error-handling/basic.slang
