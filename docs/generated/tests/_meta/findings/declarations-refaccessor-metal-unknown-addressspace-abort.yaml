  source_slang: docs/generated/tests/design/ast-reference/declarations/refaccessor-property-glsl.slang
  observed_summary: |
    A property with an explicit `[mutating] ref` accessor (RefAccessorDecl) aborts the
    Metal backend with an internal exception during emission:
      error[E99997]: Slang compilation aborted due to an exception of N5Slang13InternalErrorE
      unexpected: Unknown addressspace encountered.
    The identical shader emits cleanly on hlsl, glsl, and wgsl (each lowering the ref
    accessor to a return-by-reference helper). Repro shader:
      struct Cell {
          int _v;
          property int value { get { return _v; } [mutating] ref { return _v; } }
      }
      RWStructuredBuffer<int> outBuf;
      [shader("compute")] [numthreads(1,1,1)]
      void main() { Cell c; c._v = 0; c.value = 13; outBuf[0] = c.value; }
  exit_code: 255
  stderr_tail: "error[E99997]: Slang compilation aborted due to an exception of N5Slang13InternalErrorE unexpected: Unknown addressspace encountered."
expected:
