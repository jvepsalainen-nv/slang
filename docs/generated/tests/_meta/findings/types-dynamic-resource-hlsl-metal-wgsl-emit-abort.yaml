  source_slang: docs/generated/tests/design/ast-reference/types/dynamic-resource-spirv-emit.slang
  observed_summary: |
    A `__DynamicResource` (bindless DynamicResourceType) handle resolved via
    `.as<Texture2D<float4>>()` aborts at emit on three backends (exit 255):
      HLSL:  "internal error[E99999]: unexpected condition encountered in
              Slang compiler: unhandled HLSL register type"
      Metal: "internal error[E99999]: unimplemented feature in Slang compiler:
              unexpected IR opcode during code emit"
      WGSL:  "internal error[E99999]: unimplemented feature in Slang compiler:
              unexpected IR opcode during code emit"

    SPIR-V emits the same shader cleanly (`%handle = OpVariable
    %_ptr_UniformConstant_6 UniformConstant`). The bindless dynamic-resource
    surface should either emit a valid binding on HLSL/Metal/WGSL or a clean
    unsupported-feature diagnostic, not an unhandled-inst / unhandled-register
    internal error.
expected:
  claim: |
    Emitting a `__DynamicResource` handle to a target that does not support
    bindless dynamic resources should produce a graceful unsupported-feature
    diagnostic, not an internal-error abort (E99999).
